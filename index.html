<!DOCTYPE html>
<html>
  <head>
    <title>Stock Ticker App</title>
    <link rel="stylesheet" href="index.css">
  </head>
  <body>
     <div class="container">
       <div class="innerContainer">
        <div>
          <p>Price of Product changing with time</p>
        </div>
          <div class="name">
            <div>Name:</div>
            <div class="js-name"></div>
          </div>
          <div class="sym">
            <div>Sym:</div>
            <div class="js-sym"></div>
          </div>
          <div class="price">
            <div>Price:</div>
            <div class="js-price"></div>
            <img class="js-price-image down-image" src="images/caret-right-fill.svg" width="20">
          </div>
          <div class="time">
            <div>Time:</div>
            <div class="js-time"></div>
          </div>
         <div class="start-stop-clear-div">
           <div>
            <button class="js-start start">Start</button>
           </div>
           <div>
            <button class="js-stop stop">Stop</button>
           </div>
           <div>
            <button class="js-clear clear">Clear</button>
           </div>
          </div>
        </div>
      </div>
    <script src="index.js"></script>
  </body>
</html>
